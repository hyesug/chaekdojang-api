name: Deploy API to Staging EC2

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-api-staging
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test
        run: ./gradlew test --no-daemon

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build jar
        run: ./gradlew clean bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:staging-${{ github.sha }}
            ghcr.io/${{ github.repository }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_IMAGE: ghcr.io/${{ github.repository }}:staging-${{ github.sha }}
      DEPLOY_COMMIT: ${{ github.sha }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ github.token }}
      AWS_REGION: ap-northeast-2
      EC2_INSTANCE_ID: i-0b22c9c04390abada
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::863518416212:role/chaekdojang-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy on staging EC2 through SSM
        run: |
          set -euo pipefail

          cat > deploy-script.sh <<EOF
          set -euo pipefail

          export HOME=/root
          export APP_IMAGE="$APP_IMAGE"
          export DEPLOY_COMMIT="$DEPLOY_COMMIT"
          export GHCR_USERNAME="$GHCR_USERNAME"
          export GHCR_TOKEN="$GHCR_TOKEN"

          cd /home/ubuntu/chaekdojang-api
          git config --global --add safe.directory /home/ubuntu/chaekdojang-api
          git remote set-url origin https://github.com/hyesug/chaekdojang-api.git
          git fetch origin staging
          git checkout -B staging origin/staging
          mkdir -p deploy_history

          test -f .env.staging

          echo "\$GHCR_TOKEN" | sudo docker login ghcr.io -u "\$GHCR_USERNAME" --password-stdin
          sudo docker pull "\$APP_IMAGE"
          sudo env APP_IMAGE="\$APP_IMAGE" docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --no-build redis-staging app-staging

          for i in \$(seq 1 60); do
            code=\$(curl -s -o /tmp/chaekdojang-staging-health.txt -w "%{http_code}" http://localhost:8081/actuator/health/readiness || true)
            body=\$(cat /tmp/chaekdojang-staging-health.txt 2>/dev/null || true)
            if [ "\$code" = "200" ] && echo "\$body" | grep -q 'UP'; then
              {
                echo "deployed_at=\$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "commit=\$DEPLOY_COMMIT"
                echo "image=\$APP_IMAGE"
              } | tee deploy_history/latest-staging.env
              sudo env APP_IMAGE="\$APP_IMAGE" docker compose --env-file .env.staging -f docker-compose.staging.yml ps
              sudo docker image prune -f || true
              git log -1 --oneline
              exit 0
            fi
            sleep 2
          done

          sudo docker compose --env-file .env.staging -f docker-compose.staging.yml logs --tail=160 app-staging
          exit 1
          EOF

          encoded_script=$(base64 -w0 deploy-script.sh)

          jq -n --arg encoded_script "$encoded_script" '{
            DocumentName: "AWS-RunShellScript",
            InstanceIds: [env.EC2_INSTANCE_ID],
            Comment: ("Deploy chaekdojang-api staging " + env.DEPLOY_COMMIT),
            Parameters: {
              commands: [
                ("printf %s " + ($encoded_script | @sh) + " | base64 -d > /tmp/chaekdojang-deploy-staging.sh"),
                "bash /tmp/chaekdojang-deploy-staging.sh"
              ]
            }
          }' > send-command.json

          command_id=$(aws ssm send-command \
            --cli-input-json file://send-command.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $command_id"

          for i in $(seq 1 60); do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text)

            if [ "$status" != "Pending" ] && [ "$status" != "InProgress" ] && [ "$status" != "Delayed" ]; then
              break
            fi

            sleep 10
          done

          invocation=$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$EC2_INSTANCE_ID")
          echo "$invocation" | jq -r '.StandardOutputContent'
          error_output=$(echo "$invocation" | jq -r '.StandardErrorContent')
          if [ -n "$error_output" ]; then
            echo "$error_output" >&2
          fi

          status=$(echo "$invocation" | jq -r '.Status')
          if [ "$status" != "Success" ]; then
            echo "SSM staging deploy failed with status=$status" >&2
            exit 1
          fi
