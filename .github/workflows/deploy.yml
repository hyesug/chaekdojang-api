name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/chaekdojang-api
            git remote set-url origin https://github.com/hyesug/chaekdojang-api.git
            git pull --ff-only origin main
            cd api
            chmod +x ./gradlew
            ./gradlew build -x test --no-daemon
            sudo systemctl restart chaekdojang
            git log -1 --oneline
            echo "deploy complete"
