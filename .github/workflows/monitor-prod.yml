name: Monitor Production

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run production smoke test
        run: |
          chmod +x scripts/smoke-prod.sh
          ./scripts/smoke-prod.sh

  disk:
    runs-on: ubuntu-latest
    steps:
      - name: Check EC2 disk usage
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            usage=$(df -P / | awk 'NR==2 { gsub("%", "", $5); print $5 }')
            df -h /

            if [ "$usage" -ge 90 ]; then
              echo "Root disk usage is ${usage}%, threshold is 90%."
              exit 1
            fi

            echo "Root disk usage is ${usage}%."
