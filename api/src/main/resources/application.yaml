spring:
  application:
    name: api
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_SHUTDOWN_TIMEOUT:30s}
  config:
    import: optional:application-local.yaml
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, profile_image
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: name, email, profile_image
            client-name: Naver
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: profile, email
            client-name: Google
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
  sql:
    init:
      platform: postgresql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET:chaekdojang-dev-secret-key-must-be-32chars-ok!}
  expiration-ms: 86400000

server:
  shutdown: graceful
  forward-headers-strategy: native
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED:true}
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:100}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:10}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:20s}
  servlet:
    encoding:
      charset: UTF-8
      force: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  dev-login-enabled: ${DEV_LOGIN_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  notification:
    admin-email: ${NOTIFICATION_ADMIN_EMAIL:}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    api-limit-per-minute: ${RATE_LIMIT_API_PER_MINUTE:600}
    upload-limit-per-minute: ${RATE_LIMIT_UPLOAD_PER_MINUTE:20}
    auth-limit-per-minute: ${RATE_LIMIT_AUTH_PER_MINUTE:30}
    metrics-limit-per-minute: ${RATE_LIMIT_METRICS_PER_MINUTE:240}
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      upload-dir: ${LOCAL_UPLOAD_DIR:uploads/profile-images}
      public-path: ${LOCAL_UPLOAD_PUBLIC_PATH:/uploads/profile-images}
    s3:
      bucket: ${S3_UPLOAD_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
      public-base-url: ${S3_PUBLIC_BASE_URL:}
      profile-image-prefix: ${S3_PROFILE_IMAGE_PREFIX:profile-images}
      presigned-url-expiration-minutes: ${S3_PRESIGNED_URL_EXPIRATION_MINUTES:10}

kakao:
  api-key: ${KAKAO_API_KEY:}

deepl:
  api-key: ${DEEPL_API_KEY:}

toss:
  secret-key: ${TOSS_SECRET_KEY:}

google:
  api-key: ${GOOGLE_API_KEY:}

logging:
  level:
    ACCESS: INFO
    org.hibernate.SQL: ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:WARN}
    org.hibernate.orm.jdbc.bind: ${LOGGING_LEVEL_ORG_HIBERNATE_BIND:WARN}

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: false
