spring:
  datasource:
    url: jdbc:h2:mem:chaekdojang-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret

management:
  health:
    redis:
      enabled: false
