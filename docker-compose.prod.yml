# Production docker compose for EC2.
# PostgreSQL runs on AWS RDS, so this file only runs Redis and the API app.
#
# Usage:
#   APP_IMAGE=ghcr.io/hyesug/chaekdojang-api:<tag> docker compose --env-file .env.production -f docker-compose.prod.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: chaekdojang-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-chaekdojang-api:local}
    container_name: chaekdojang-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.production
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_FORMAT_SQL: "false"
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "1"
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN
      LOGGING_LEVEL_ORG_HIBERNATE_BIND: WARN
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_TOMCAT_THREADS_MAX: 100
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      RATE_LIMIT_ENABLED: "true"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    depends_on:
      redis:
        condition: service_healthy
