# Production docker compose for EC2.
# PostgreSQL runs on AWS RDS, so this file only runs Redis and the API app.
#
# Usage:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    container_name: chaekdojang-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-chaekdojang-api:local}
    container_name: chaekdojang-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.production
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "1"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
