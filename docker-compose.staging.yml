# Staging docker compose for EC2.
# Use a separate RDS database and a separate FRONTEND_URL/BACKEND_URL from production.
#
# Usage:
#   docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --build

services:
  redis-staging:
    image: redis:7-alpine
    container_name: chaekdojang-redis-staging
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-staging:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-chaekdojang-api:staging}
    container_name: chaekdojang-app-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    env_file:
      - .env.staging
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_FORMAT_SQL: "false"
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "1"
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN
      LOGGING_LEVEL_ORG_HIBERNATE_BIND: WARN
      REDIS_HOST: redis-staging
      REDIS_PORT: 6379
      SERVER_TOMCAT_THREADS_MAX: 100
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      RATE_LIMIT_ENABLED: "true"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    depends_on:
      redis-staging:
        condition: service_healthy
