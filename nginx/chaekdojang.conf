# /etc/nginx/sites-available/chaekdojang-api
#
# Replace YOUR_API_DOMAIN with the API domain, for example:
#   api.chaekdojang.com
#
# This config assumes the Spring Boot API is exposed only on localhost:8080
# by docker-compose.prod.yml.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_API_DOMAIN;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_API_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_API_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
